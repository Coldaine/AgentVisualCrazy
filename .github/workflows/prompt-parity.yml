name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shadow-agent/package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Install shadow-agent dependencies
        run: npm ci
        working-directory: shadow-agent

      - name: Verify generated prompt artifacts
        run: npm run prompts:check

      - name: Run tests
        run: npm test
        working-directory: shadow-agent

      - name: Build
        run: npm run build
        working-directory: shadow-agent
