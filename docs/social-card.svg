<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#E8A07C"/>
    </linearGradient>
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1f"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="15%" cy="55%" r="45%">
      <stop offset="0%" stop-color="rgba(217,119,87,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="85%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(66,133,244,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.7" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#222225" stroke-width="1"/>

  <!-- Logo icon (top-left) -->
  <g transform="translate(80, 60)">
    <rect width="36" height="36" rx="7" fill="#2D2B2A"/>
    <line x1="8" y1="5" x2="8" y2="31" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
    <path d="M22 5v11c0 4.5-6.5 6.8-14 11" stroke="#D97757" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- "sidecar" text next to logo -->
  <text x="128" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f5f5f3" letter-spacing="-0.5">sidecar</text>

  <!-- Main title -->
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#f5f5f3" letter-spacing="-3">Claude</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent-grad)" letter-spacing="-3">Sidecar</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#a1a1a0">A parallel AI window for Claude Code and Cowork.</text>

  <!-- Fork / Work / Fold tags -->
  <g transform="translate(80, 375)">
    <rect width="80" height="32" rx="6" fill="none" stroke="#D97757" stroke-width="1.2"/>
    <text x="40" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#D97757" text-anchor="middle">Fork</text>
  </g>
  <g transform="translate(175, 375)">
    <rect width="80" height="32" rx="6" fill="none" stroke="#D97757" stroke-width="1.2"/>
    <text x="40" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#D97757" text-anchor="middle">Work</text>
  </g>
  <g transform="translate(270, 375)">
    <rect width="80" height="32" rx="6" fill="#D97757"/>
    <text x="40" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Fold</text>
  </g>

  <!-- Right side: mini fork-fold diagram -->
  <!-- Claude Code window -->
  <g transform="translate(680, 130)">
    <rect width="200" height="150" rx="10" fill="url(#box-grad)" stroke="#2c2c30" stroke-width="1.2"/>
    <!-- Title bar -->
    <rect width="200" height="26" rx="10" fill="#1c1c1f"/>
    <rect y="16" width="200" height="10" fill="#1c1c1f"/>
    <circle cx="16" cy="13" r="4" fill="#e25555" opacity="0.6"/>
    <circle cx="28" cy="13" r="4" fill="#e2a855" opacity="0.6"/>
    <circle cx="40" cy="13" r="4" fill="#55c255" opacity="0.6"/>
    <text x="100" y="17" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#a1a1a0">Claude Code</text>
    <!-- Chat lines -->
    <rect x="14" y="38" width="80" height="3" rx="1.5" fill="#2c2c30"/>
    <rect x="14" y="48" width="120" height="3" rx="1.5" fill="#2c2c30"/>
    <rect x="14" y="58" width="60" height="3" rx="1.5" fill="#2c2c30"/>
    <rect x="14" y="74" width="100" height="3" rx="1.5" fill="#D97757" opacity="0.25"/>
    <rect x="14" y="84" width="140" height="3" rx="1.5" fill="#D97757" opacity="0.25"/>
    <!-- Fold summary box -->
    <rect x="14" y="100" width="172" height="34" rx="5" fill="rgba(217,119,87,0.08)" stroke="#D97757" stroke-width="0.8"/>
    <text x="100" y="117" text-anchor="middle" font-family="monospace" font-size="9" fill="#D97757">FOLD summary received</text>
    <text x="100" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#e8a07c">3 findings, 2 recommendations</text>
  </g>

  <!-- Arrow: fork -->
  <line x1="890" y1="205" x2="940" y2="165" stroke="#D97757" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="938,161 946,163 940,169" fill="#D97757"/>

  <!-- Arrow: fold back -->
  <line x1="940" y1="265" x2="890" y2="230" stroke="#666" stroke-width="1.2" stroke-dasharray="5,4"/>
  <polygon points="892,234 884,228 888,226" fill="#666"/>

  <!-- Sidecar window -->
  <g transform="translate(950, 110)">
    <rect width="180" height="120" rx="10" fill="url(#box-grad)" stroke="#D97757" stroke-width="1.2"/>
    <!-- Title bar -->
    <rect width="180" height="24" rx="10" fill="#1c1c1f"/>
    <rect y="14" width="180" height="10" fill="#1c1c1f"/>
    <text x="90" y="16" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#D97757">Sidecar</text>
    <!-- Model label -->
    <rect x="12" y="32" width="70" height="16" rx="4" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="0.8"/>
    <text x="47" y="43" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ade80">Gemini Pro</text>
    <!-- Chat lines -->
    <rect x="12" y="56" width="100" height="3" rx="1.5" fill="#2c2c30"/>
    <rect x="12" y="66" width="140" height="3" rx="1.5" fill="#2c2c30"/>
    <rect x="12" y="76" width="80" height="3" rx="1.5" fill="#2c2c30"/>
    <!-- Fold button -->
    <rect x="110" y="92" width="56" height="20" rx="5" fill="#D97757"/>
    <text x="138" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Fold</text>
  </g>

  <!-- Bottom: install command -->
  <g transform="translate(80, 470)">
    <rect width="340" height="40" rx="7" fill="#111113" stroke="#2c2c30" stroke-width="1"/>
    <text x="16" y="26" font-family="monospace" font-size="14" fill="#666">$</text>
    <text x="32" y="26" font-family="monospace" font-size="14" fill="#f5f5f3">npm install -g claude-sidecar</text>
  </g>

  <!-- Model badges along the bottom -->
  <g transform="translate(80, 540)">
    <rect width="72" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="36" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">Gemini</text>
  </g>
  <g transform="translate(162, 540)">
    <rect width="52" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="26" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">GPT</text>
  </g>
  <g transform="translate(224, 540)">
    <rect width="84" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="42" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">DeepSeek</text>
  </g>
  <g transform="translate(318, 540)">
    <rect width="58" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="29" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">Qwen</text>
  </g>
  <g transform="translate(386, 540)">
    <rect width="56" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="28" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">Grok</text>
  </g>
  <g transform="translate(452, 540)">
    <rect width="66" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="33" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#a1a1a0">Claude</text>
  </g>
  <g transform="translate(528, 540)">
    <rect width="40" height="24" rx="5" fill="#161618" stroke="#2c2c30" stroke-width="0.8"/>
    <text x="20" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">+</text>
  </g>
</svg>
