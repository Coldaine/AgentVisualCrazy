<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1C29" />
      <stop offset="100%" stop-color="#111219" />
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2C3C" />
      <stop offset="100%" stop-color="#232533" />
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97757" />
    </marker>
    <marker id="arr-fold" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#6A6E7A" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="url(#bg)" rx="12" />

  <!-- ===== Left Window: Claude Code ===== -->
  <rect x="30" y="24" width="340" height="260" fill="url(#box)" stroke="#3A3C4C" stroke-width="1.5" rx="8" />
  <!-- Title bar -->
  <rect x="30" y="24" width="340" height="26" fill="#2A2C3C" rx="8" />
  <rect x="30" y="38" width="340" height="12" fill="url(#box)" />
  <circle cx="48" cy="37" r="4" fill="#E25555" opacity="0.7" />
  <circle cx="61" cy="37" r="4" fill="#E2A855" opacity="0.7" />
  <circle cx="74" cy="37" r="4" fill="#55C255" opacity="0.7" />
  <text x="200" y="41" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#A5A9B5" text-anchor="middle">Claude Code (main session)</text>

  <!-- Chat messages -->
  <!-- User message -->
  <rect x="48" y="62" width="180" height="28" rx="6" fill="#3A3C4C" />
  <text x="58" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#A5A9B5">You</text>
  <text x="58" y="84" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC">"Implement the auth flow"</text>

  <!-- Assistant response -->
  <rect x="48" y="98" width="220" height="28" rx="6" fill="#2E3040" />
  <text x="58" y="109" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#D97757">Claude</text>
  <text x="58" y="120" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC">Working on it...</text>

  <!-- Working indicator dots -->
  <text x="58" y="148" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#6A6E7A" font-style="italic">(keeps working while you</text>
  <text x="58" y="160" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#6A6E7A" font-style="italic"> interact with sidecar)</text>

  <!-- Fold result -->
  <rect x="48" y="185" width="300" height="44" rx="6" fill="#D97757" opacity="0.1" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" />
  <text x="58" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#D97757">FOLD Summary received</text>
  <text x="58" y="213" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#E28E73">Race condition found in token refresh.</text>
  <text x="58" y="224" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#E28E73">Recommend mutex on concurrent requests.</text>

  <!-- Claude adapts -->
  <rect x="48" y="238" width="240" height="28" rx="6" fill="#2E3040" />
  <text x="58" y="249" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#D97757">Claude</text>
  <text x="58" y="260" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC">Updating approach with mutex...</text>

  <!-- ===== Right Window: Sidecar ===== -->
  <rect x="430" y="24" width="340" height="260" fill="url(#box)" stroke="#D97757" stroke-width="2" rx="8" />
  <!-- Title bar -->
  <rect x="430" y="24" width="340" height="26" fill="#D97757" opacity="0.12" rx="8" />
  <rect x="430" y="38" width="340" height="12" fill="url(#box)" />
  <circle cx="448" cy="37" r="4" fill="#E25555" opacity="0.7" />
  <circle cx="461" cy="37" r="4" fill="#E2A855" opacity="0.7" />
  <circle cx="474" cy="37" r="4" fill="#55C255" opacity="0.7" />
  <text x="600" y="41" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#D97757" text-anchor="middle">Sidecar (parallel window)</text>

  <!-- Model badge -->
  <rect x="448" y="58" width="120" height="18" rx="9" fill="#D97757" opacity="0.15" />
  <text x="508" y="70" font-family="SF Mono, Menlo, monospace" font-size="9" font-weight="600" fill="#E28E73" text-anchor="middle">Gemini 3 Pro</text>

  <!-- Context indicator -->
  <rect x="578" y="58" width="170" height="18" rx="9" fill="#3A3C4C" />
  <text x="663" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#7A7E8A" text-anchor="middle">Context: shared from main</text>

  <!-- User question -->
  <rect x="448" y="86" width="300" height="38" rx="6" fill="#3A3C4C" />
  <text x="458" y="99" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#A5A9B5">You</text>
  <text x="458" y="112" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC">"Is this approach correct? Edge cases?"</text>

  <!-- Gemini response -->
  <rect x="448" y="132" width="300" height="70" rx="6" fill="#2E3040" />
  <text x="458" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#E28E73">Gemini</text>
  <text x="458" y="158" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC">"There's a race condition when multiple</text>
  <text x="458" y="170" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC"> requests hit the token refresh endpoint</text>
  <text x="458" y="182" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC"> concurrently. Use a mutex pattern..."</text>
  <text x="458" y="196" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#D4D0CC"></text>

  <!-- Toolbar -->
  <rect x="430" y="244" width="340" height="40" fill="#2D2B2A" rx="0" />
  <rect x="430" y="244" width="340" height="1" fill="#3D3A38" />
  <!-- Round bottom corners -->
  <rect x="430" y="272" width="340" height="12" fill="#2D2B2A" rx="8" />
  <text x="460" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#D97757" letter-spacing="0.5">SIDECAR</text>
  <text x="510" y="262" font-family="SF Mono, Menlo, monospace" font-size="8" fill="#7A756F">3:42</text>
  <!-- Fold button -->
  <rect x="700" y="251" width="50" height="20" rx="4" fill="#D97757" />
  <text x="725" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#FFF" text-anchor="middle">Fold</text>

  <!-- ===== Arrows between windows ===== -->
  <!-- Fork arrow (right) -->
  <path d="M 370 110 L 395 110 Q 405 110 405 120 L 405 145 Q 405 155 415 155 L 430 155" fill="none" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3" />
  <text x="398" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#D97757" text-anchor="middle">Fork</text>

  <!-- Fold arrow (left) -->
  <path d="M 430 225 L 415 225 Q 405 225 405 215 L 405 205 Q 405 195 395 195 L 370 195" fill="none" stroke="#6A6E7A" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-fold)" />
  <text x="398" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#6A6E7A" text-anchor="middle">Fold</text>

  <!-- ===== Bottom tagline ===== -->
  <text x="400" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6A6E7A" text-anchor="middle">Your main session keeps working  ·  The sidecar finds the issue  ·  Results fold back automatically</text>

</svg>
